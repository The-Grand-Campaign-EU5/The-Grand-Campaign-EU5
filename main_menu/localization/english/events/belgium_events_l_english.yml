l_english:
 belgium.1.title: "Mediating Belgian Independence"
 belgium.1.desc: "While Belgium’s de facto independence from The Netherlands had been established by force of arms during the Belgian revolution of 1831, it has not been confirmed de jure by The Netherlands and technically a state of war still exists between the two nations. The idea has arisen that the British Empire should step in and mediate a settlement, demanding the Dutch give up their claims in return for guarantees of Belgian independence and control over Luxembourg. However, we best ought to obtain the support of the other Great Powers: France, in particular."
 belgium.1.a: "Let us see what they think."
 belgium.2.title: "Mediating Belgian Independence"
 belgium.2.desc: "While Belgium’s de facto independence from The Netherlands had been established by force of arms during the Belgian revolution of 1831, it has not been confirmed de jure by The Netherlands and technically a state of war still exists between the two nations. The British have come to us with an offer of jointly mediating Belgian independence, with Limburg and Luxembourg restored to the Netherlands in a personal union.\nHowever, a few of our diplomats suggest that we re-propose the Flahaut Plan, where Belgium would be divided between the powers of France, Britain, Prussia and the Netherlands. The British would in this plan gain a protectorate around Ghent, the Prussians will take custody over the duchies of Luxembourg and Limburg while the Dutch regain control over eastern Flanders. We would gain control over western Wallonia as well as the region around Brussels."
 belgium.2.a: "We will support the British proposal."
 belgium.2.b: "Raise the Flahaut Plan again—surely they will be reasonable?"
 belgium.3.title: "Mediating Belgian Independence"
 belgium.3.desc: "Thankfully, our cross-Channel neighbor has seen reason and seen fit to support our proposal. With the powers of Europe at the table, it seems unlikely the Dutch would refuse if we were to present our settlement to them."
 belgium.3.a: "See it done."
 belgium.4.title: "Mediating Belgian Independence"
 belgium.4.desc: "While Belgium’s de facto independence from the Netherlands had been established by force of arms during the Belgian Revolution of 1831, it has not been confirmed de jure and we yet hold claims over Belgian territory. The British have offered to mediate a settlement-in return for the surrendering of our claims and a guarantee of Belgium’s neutrality, we would receive the Rhenish part of Luxembourg as our vassal… as well as a great deal of standing in the eyes of the European powers."
 belgium.4.a: "We will follow Britain's wishes."
 belgium.4.b: "We do not require outside mediation!"
 belgium.5.title: "Mediating Belgian Independence"
 belgium.5.desc: "In a meeting mediated by the British, the Netherlands has offered to sign a treaty which would see them relinquish all claims to Belgian territory-but at the cost of surrendering Luxembourg to them as a vassal. Some are claiming this is too high a price, and that we should not allow ourselves to be bullied into such a treaty… but this may also be the only chance we have at peace with the Dutch."
 belgium.5.a: "We agree to their terms."
 belgium.5.b: "We refuse!"
 belgium.6.title: "The 1839 Treaty of London"
 belgium.6.desc: "Both the Dutch and Belgians have agreed to our proposed settlement, and the territorial handovers are proceeding quickly. Once more, we have demonstrated that London lies at the diplomatic heart of Europe."
 belgium.6.a: "A splendid outcome!"
 belgium.7.title: "The Second Belgian Revolution"
 belgium.7.desc: "Foolishly, the Belgians have rejected London's offer, and as a result, we now have a window of opportunity where we may elimate them."
 belgium.7.a: "What were they thinking?"
 belgium.8.title: "The Flahaut Plan"
 belgium.8.desc: "Originally proposed in 1830, the Talleyrand partition plan would split Belgium between France, Prussia, Britain and the Netherlands. Although we initially rejected this idea a few years prior, France has requested we reconsider our position on the matter. Under the plan, we would gain a protectorate around Antwerp and Ghent, the Prussians will take custody over the duchies of Luxembourg and Limburg, the French of western Wallonia as well as the region around Brussels, while the Dutch regain control over eastern Flanders. Most of our diplomats recommend we reject this offer for the military difficulty in defending a few coastal cities."
 belgium.8.a: "Follow their advice, reject this so-called plan."
 belgium.8.b: "On second thought..."
 belgium.9.title: "The Flahaut Plan Rejected"
 belgium.9.desc: "Unfortunately, the British have rejected our proposed plan. Admittedly, it did allow our main rival a sizable land base on the Continent, so perhaps their rejection is a blessing in disguise."
 belgium.9.a: "It is what it is."
 belgium.10.title: "The Flahaut Plan Accepted"
 belgium.10.desc: "Miracle! The British have reconsidered their stance on the Belgian question and are supporting us in enforcing the Flahaut Plan. The question remains whether Belgium will concede to this joint diktat, but our advisors predict they will almost certainly accept."
 belgium.10.a: "A mere formality."
 belgium.11.title: "The Flahaut Insanity"
 belgium.11.desc: "A French delegation has notified us that after lobbying the British government for support, the British have changed their diplomatic stance regarding our country. Now, neither state wishes for us to be an independent state, and instead want to partition us between our neighbours. Although a few suggest resisting, most know in their hearts that it will be a pointless struggle."
 belgium.11.a: "Monsters, all of them."
 belgium.12.title: "The Flahaut Plan"
 belgium.12.desc: "The Belgian government has confirmed that it will abide by the Flahaut Plan, and has begun transferring governorship of its territories in accordance with the plan."
 belgium.12.a: "An old plan salvaged, excellent!"