l_english:
 poland.1.title: "The Kraków Uprising"
 poland.1.desc: "The Kraków Uprising of February 1846 was an attempt, led by Edward Dembowski, to incite a Polish fight for national independence. Most of the uprising was limited to the Free City of Kraków, where Jagiellonian University philosophy professor Michal Wiszniewski acted as its chief for a day, to be followed by Rector Jan Tyssowski. Teofil Wisniowski, the President of the Uprising Tribunal in the Austrian province of Galizien, led a short-lived uprising in Eastern Galicia, which saw a battle at Narajów involving Austrian hussars."
 poland.1.a: "Let the revolutionaries take the city. For a united Poland!"
 poland.2.title: "The Kraków Uprising"
 poland.2.desc: "When a Polish insurrection broke out in Galicia early in 1846, Austria held that Krakow’s independent status provided the stimulus as well as a forum for the planning of Polish revolts. However, we would be best advised to obtain the consent of Russia and Prussia to suppress the Republic of Krakow if we wish to legitimize our annexation of the city."
 poland.2.a: "Dispatch diplomats to begin the talks."
 poland.3.title: "The Kraków Uprising"
 poland.3.desc: "A Polish revolution began on Kraków and it threatens to spread like wildfire in our great nation. Austria is asking our consent to suppress Kraków, arguing the free city is the focus of the Polish nationality and insurgency and that suppressing the city can end future Polish rebellions. Our diplomats are worried that this rebellion may grow and incite our own Polish populations if we don’t support the Austrians. What do we tell the Austrian envoy?"
 poland.3.a: "Let the Austrians know that they have our support on this matter."
 poland.3.b: "Perhaps it is better if we sabotage the Austrians a bit..."
 poland.4.title: "The Kraków Uprising"
 poland.4.desc: "A Polish revolution began on Kraków and it threatens to spread like wildfire in our great nation. Austria is asking our consent to suppress Kraków, arguing the free city is the focus of the Polish nationality and insurgency and that suppressing the city can end future Polish rebellions. Our diplomats are worried that this rebellion may grow and incite our own Polish populations if we don’t support the Austrians. What do we tell the Austrian envoy?"
 poland.4.a: "Let the Austrians know that they have our support on this matter."
 poland.4.b: "Perhaps it is better if we sabotage the Austrians a bit..."
 poland.5.title: "The Fate of Kraków"
 poland.5.desc: "Russia and Prussia agreed to our proposed solution. With the consent of all three powers of the Holy Alliance, our troops are ready for deployment to put down this instance of Polish rebellion."
 poland.5.a: "To Kraków! For the Kaiser!"
 poland.6.title: "The Fate of Kraków"
 poland.6.desc: "Unfortunately, some of our so-called allies in the Holy Alliance have seen fit to attempt an act of petty sabotage in denying us our annexation of Kraków. Still, although acting now might anger them, not acting might make the Poles even bolder."
 poland.6.a: "We don’t need their approval! We will march on Kraków."
 poland.6.b: "Maybe it’s wiser to let this matter go."
